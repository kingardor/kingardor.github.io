    <!-- Loading screen styles (pure CSS, zero JS dependency) -->
    <style>
      #loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #0b0b0f;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 1.1rem;
        overflow: hidden;
        transition: opacity 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* Grain overlay */
      #loader::before {
        content: '';
        position: absolute;
        inset: -50%;
        width: 200%;
        height: 200%;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='grain'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23grain)'/%3E%3C/svg%3E");
        opacity: 0.05;
        pointer-events: none;
        animation: loaderGrain 0.35s steps(1) infinite;
      }

      /* Scanning glow line */
      #loader::after {
        content: '';
        position: absolute;
        left: 0;
        right: 0;
        height: 140px;
        background: linear-gradient(transparent, rgba(220, 38, 38, 0.07), transparent);
        pointer-events: none;
        animation: loaderScan 3.5s linear infinite;
      }

      .loader-logo {
        font-family: 'Outfit', ui-sans-serif, system-ui, sans-serif;
        font-weight: 900;
        font-size: clamp(5rem, 14vw, 8rem);
        line-height: 1;
        color: #f4f4f5;
        letter-spacing: -0.02em;
        position: relative;
        z-index: 1;
        margin: 0;
        animation: loaderLogoIn 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.1s both;
      }

      .loader-logo .dot {
        color: #dc2626;
        display: inline-block;
        animation: loaderGlow 2s ease-in-out 0.75s infinite;
      }

      .loader-terminal {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 0.6rem;
        letter-spacing: 0.08em;
        color: rgba(255, 255, 255, 0.35);
        display: flex;
        flex-direction: column;
        gap: 5px;
        width: min(320px, 82vw);
        position: relative;
        z-index: 1;
        margin: 0;
      }

      .loader-line {
        overflow: hidden;
        white-space: nowrap;
        clip-path: inset(0 100% 0 0);
        animation: loaderType 0.45s steps(22) forwards;
        opacity: 0;
        animation-fill-mode: both;
      }
      .loader-line.l1 { animation-delay: 0.35s; }
      .loader-line.l2 { animation-delay: 0.65s; }
      .loader-line.l3 { animation-delay: 0.95s; }
      .loader-line.l4 { animation-delay: 1.15s; }
      .loader-line.l5 { animation-delay: 1.35s; color: rgba(255,255,255,0.55); }
      .loader-line .ok { color: #22c55e; }

      @keyframes loaderType {
        from { clip-path: inset(0 100% 0 0); opacity: 1; }
        to   { clip-path: inset(0 0% 0 0);   opacity: 1; }
      }

      .loader-bar-wrap {
        width: min(200px, 52vw);
        height: 1.5px;
        background: rgba(255, 255, 255, 0.07);
        border-radius: 99px;
        position: relative;
        z-index: 1;
        overflow: hidden;
        margin-top: 0.3rem;
      }

      .loader-bar-fill {
        height: 100%;
        width: 0;
        background: linear-gradient(90deg, #dc2626, #db2777);
        border-radius: 99px;
        animation: loaderBar 1.4s cubic-bezier(0.4, 0, 0.2, 1) 0.25s forwards;
        box-shadow: 0 0 8px rgba(220, 38, 38, 0.65);
      }

      .loader-dots {
        position: absolute;
        bottom: 2.25rem;
        display: flex;
        gap: 6px;
        z-index: 1;
      }

      .loader-dots span {
        display: block;
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: rgba(220, 38, 38, 0.4);
        animation: loaderDot 1.2s ease-in-out infinite;
      }
      .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
      .loader-dots span:nth-child(3) { animation-delay: 0.4s; }

      @keyframes loaderLogoIn {
        from { opacity: 0; transform: translateY(20px) scale(0.95); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }

      @keyframes loaderBar {
        from { width: 0; }
        to   { width: 100%; }
      }

      @keyframes loaderGlow {
        0%, 100% { text-shadow: 0 0 22px rgba(220,38,38,0.9), 0 0 50px rgba(220,38,38,0.4); }
        50%       { text-shadow: 0 0 10px rgba(220,38,38,0.35), 0 0 20px rgba(220,38,38,0.12); }
      }

      @keyframes loaderDot {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50%       { opacity: 1;   transform: scale(1.6); }
      }

      @keyframes loaderScan {
        0%   { top: -15%; }
        100% { top: 115%; }
      }

      @keyframes loaderGrain {
        0%  { transform: translate(0,0); }
        10% { transform: translate(-4%,-8%); }
        20% { transform: translate(-12%,4%); }
        30% { transform: translate(6%,-20%); }
        40% { transform: translate(-4%,20%); }
        50% { transform: translate(-12%,8%); }
        60% { transform: translate(12%,0%); }
        70% { transform: translate(0%,12%); }
        80% { transform: translate(2%,28%); }
        90% { transform: translate(-8%,8%); }
      }
    </style>
  </head>
  <body>
    <!-- Timestamp so main.jsx can compute how long loader has been visible -->
    <script>window.__LOADER_START = Date.now()</script>

    <div id="loader" aria-hidden="true">

      </div>

        <div class="loader-bar-fill"></div>
      </div>
      <div class="loader-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
